# ============================================================
# IT 资产生命周期管理系统 —— 第一版部署上线编排（MVP-0/1/2 平台底座）
# 服务四员：postgres / redis / backend / frontend
# ------------------------------------------------------------
# 说明：
#  * 数据（postgres）与缓存（redis）以及后端（backend）均【不发布宿主机端口】，
#    仅对 compose 内网可见，外部不可直接访问。
#  * 前端（frontend，nginx）仅绑定 127.0.0.1，默认对外端口 3000，
#    即 http://127.0.0.1:3000 ；如需改端口，设置 .env 中 ITAM_PUBLIC_PORT。
#  * 所有密钥（POSTGRES_PASSWORD / ITAM_JWT_SECRET 等）来自同目录 .env，
#    务必先准备 .env（参考 .env.example）。缺失关键变量 compose 将直接报错。
#  * 启动命令：docker compose up -d --build
#  * backend 通过 SPRING_PROFILES_ACTIVE=prod 加载 application-prod.yml，
#    强制要求 ITAM_JWT_SECRET 注入强随机串，缺失则后端启动失败（预期的安全行为）。
# ============================================================

services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-itam}
      POSTGRES_USER: ${POSTGRES_USER:-itam}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?ERROR: set POSTGRES_PASSWORD in .env}
    # 不发布宿主机端口，仅对内网可见
    volumes:
      - itam-pg:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  redis:
    image: redis:7
    # 不发布宿主机端口，仅对内网可见
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  backend:
    build: ./backend
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      SPRING_PROFILES_ACTIVE: prod
      ITAM_DB_URL: jdbc:postgresql://postgres:5432/${POSTGRES_DB:-itam}
      ITAM_DB_USERNAME: ${POSTGRES_USER:-itam}
      ITAM_DB_PASSWORD: ${POSTGRES_PASSWORD:?ERROR: set POSTGRES_PASSWORD in .env}
      ITAM_REDIS_HOST: redis
      ITAM_REDIS_PORT: "6379"
      ITAM_REDIS_PASSWORD: ${ITAM_REDIS_PASSWORD:-}
      ITAM_JWT_SECRET: ${ITAM_JWT_SECRET:?ERROR: set ITAM_JWT_SECRET in .env}
    # 不发布宿主机端口，仅供 compose 内网访问
    healthcheck:
      test: ["CMD-SHELL", "curl -f -s -o /dev/null http://localhost:8080/api/v1/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  frontend:
    build: ./frontend
    depends_on:
      backend:
        condition: service_healthy
    ports:
      - "127.0.0.1:${ITAM_PUBLIC_PORT:-3000}:80"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost/ -O /dev/null || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 10
    restart: unless-stopped

volumes:
  itam-pg:
